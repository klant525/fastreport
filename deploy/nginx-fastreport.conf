upstream fastreport_app {
    server 127.0.0.1:8000;
    keepalive 8;
}

limit_req_zone $binary_remote_addr zone=fastreport_limit:10m rate=10r/m;
limit_conn_zone $binary_remote_addr zone=fastreport_conn:10m;

server {
    listen 80;
    server_name _;

    client_max_body_size 25m;
    keepalive_timeout 15;
    send_timeout 180;

    location /healthz {
        proxy_pass http://fastreport_app;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        limit_req zone=fastreport_limit burst=8 nodelay;
        limit_conn fastreport_conn 8;

        proxy_pass http://fastreport_app;
        proxy_http_version 1.1;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
}

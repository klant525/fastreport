services:
  fastreport:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastreport
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env.local
    environment:
      GUNICORN_BIND: "0.0.0.0:8000"
      GUNICORN_WORKER_CLASS: "sync"
      WEB_CONCURRENCY: "1"
      GUNICORN_THREADS: "1"
      GUNICORN_TIMEOUT: "150"
      GUNICORN_KEEPALIVE: "1"
      GUNICORN_MAX_REQUESTS: "12"
      GUNICORN_MAX_REQUESTS_JITTER: "3"
      MALLOC_ARENA_MAX: "2"
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
      OPENCV_OPENCL_RUNTIME: "disabled"
      HOST: "0.0.0.0"
      PORT: "8000"
    tmpfs:
      - /app/uploads:size=64m,mode=1777
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    mem_limit: 768m
